<!DOCTYPE html>
<html lang="bn" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>অ্যাডমিন প্যানেল | দৈনিক অনুলিপি</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@400;600;700&family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --red:#C8102E;--dkred:#9e0b22;
  --bg:#0f0f0f;--sur:#1a1a1a;--sur2:#222;--sur3:#2c2c2c;
  --txt:#efefef;--txt2:#aaa;--txt3:#555;--bdr:#2d2d2d;
  --green:#22c55e;--amber:#f59e0b;--blue:#3b82f6;--purple:#a855f7;
  --danger:#ef4444;
}
[data-theme=light]{
  --bg:#e8e8e8;--sur:#fff;--sur2:#f5f5f5;--sur3:#eaeaea;
  --txt:#111;--txt2:#555;--txt3:#bbb;--bdr:#e0e0e0;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans Bengali',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;transition:background .3s,color .3s;}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}

/* ── LOCK ── */
#lock{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px;}
.lock-box{background:var(--sur);border-top:4px solid var(--red);padding:40px 36px;width:100%;max-width:400px;text-align:center;transition:background .3s;}
.lock-logo{font-family:'Noto Serif Bengali',serif;font-size:28px;font-weight:700;margin-bottom:4px;}
.lock-logo em{color:var(--red);font-style:normal;}
.lock-sub{font-size:11px;color:var(--txt3);letter-spacing:1px;margin-bottom:20px;}
.lock-title{font-size:18px;font-weight:700;margin-bottom:5px;}
.lock-desc{font-size:13px;color:var(--txt2);margin-bottom:22px;}
.lf{width:100%;padding:10px 13px;border:1px solid var(--bdr);font-size:14px;background:var(--sur2);color:var(--txt);margin-bottom:10px;outline:none;transition:border-color .2s,background .3s;}
.lf:focus{border-color:var(--red);}
.lbtn{width:100%;background:var(--red);color:#fff;border:none;padding:11px;font-size:15px;font-weight:700;cursor:pointer;transition:background .2s;}
.lbtn:hover{background:var(--dkred);}
.lerr{color:var(--red);font-size:13px;margin-top:8px;display:none;}

/* ── LAYOUT ── */
#app{display:none;min-height:100vh;}
.sidebar{
  position:fixed;top:0;left:0;width:220px;height:100vh;
  background:var(--sur);border-right:1px solid var(--bdr);
  display:flex;flex-direction:column;z-index:200;
  transition:background .3s,border-color .3s,transform .3s;
  overflow-y:auto;
}
.sb-logo{padding:18px 16px;border-bottom:1px solid var(--bdr);}
.sb-logo .sbl{font-family:'Noto Serif Bengali',serif;font-size:20px;font-weight:700;}
.sb-logo .sbl em{color:var(--red);font-style:normal;}
.sb-logo .sbsub{font-size:10px;color:var(--txt3);margin-top:2px;letter-spacing:.5px;}
.sb-nav{flex:1;padding:10px 0;}
.sn{display:flex;align-items:center;gap:10px;padding:11px 18px;font-size:13.5px;font-weight:600;color:var(--txt2);cursor:pointer;border-left:3px solid transparent;transition:all .2s;}
.sn:hover,.sn.on{color:var(--txt);border-left-color:var(--red);background:var(--sur2);}
.sn .ic{font-size:16px;width:20px;text-align:center;flex-shrink:0;}
.sb-bottom{padding:12px 16px;border-top:1px solid var(--bdr);display:flex;gap:8px;align-items:center;}
.theme-btn{background:var(--sur2);border:1px solid var(--bdr);width:32px;height:32px;border-radius:50%;font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--txt2);transition:all .3s;}
.theme-btn:hover{border-color:var(--red);}
.lo-btn{flex:1;background:none;border:1px solid var(--bdr);padding:7px;font-size:12.5px;color:var(--txt2);transition:all .2s;}
.lo-btn:hover{background:var(--danger);color:#fff;border-color:var(--danger);}

/* MOBILE TOGGLE */
.mob-toggle{display:none;position:fixed;top:12px;left:12px;z-index:300;background:var(--red);color:#fff;border:none;width:38px;height:38px;font-size:18px;align-items:center;justify-content:center;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:150;}

/* MAIN */
.main{margin-left:220px;padding:24px;min-height:100vh;transition:margin .3s;}
.page-head{margin-bottom:22px;}
.page-head h2{font-family:'Noto Serif Bengali',serif;font-size:22px;font-weight:700;}
.page-head p{font-size:13px;color:var(--txt2);margin-top:3px;}

/* STAT CARDS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.stat-card{background:var(--sur);padding:18px;border-left:4px solid;transition:background .3s;}
.stat-card.total{border-color:var(--blue);}
.stat-card.pub{border-color:var(--green);}
.stat-card.draft{border-color:var(--amber);}
.stat-card.authors{border-color:var(--purple);}
.stat-card .sv{font-size:32px;font-weight:700;line-height:1;}
.stat-card .sl{font-size:12px;color:var(--txt2);margin-top:5px;font-weight:600;}
.stat-card .si{font-size:22px;float:right;margin-top:-4px;opacity:.6;}

/* CHART */
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px;}
.chart-card{background:var(--sur);padding:18px;transition:background .3s;}
.chart-card h4{font-size:13.5px;font-weight:700;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--bdr);}
.bar-chart{display:flex;flex-direction:column;gap:7px;}
.bc-row{display:flex;align-items:center;gap:8px;}
.bc-label{font-size:12px;color:var(--txt2);width:90px;flex-shrink:0;text-align:right;}
.bc-track{flex:1;background:var(--sur3);height:20px;position:relative;overflow:hidden;}
.bc-fill{height:100%;background:var(--red);transition:width .6s ease;display:flex;align-items:center;padding-left:6px;}
.bc-fill span{font-size:11px;color:#fff;font-weight:700;white-space:nowrap;}
.donut-wrap{display:flex;justify-content:center;align-items:center;gap:20px;flex-wrap:wrap;}
.donut-legend{display:flex;flex-direction:column;gap:6px;}
.dl-item{display:flex;align-items:center;gap:6px;font-size:12px;}
.dl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.activity-grid{display:flex;align-items:flex-end;gap:4px;height:60px;}
.ag-bar{flex:1;background:var(--red);opacity:.7;border-radius:2px 2px 0 0;min-height:3px;transition:height .4s;}
.ag-bar:hover{opacity:1;}
.ag-labels{display:flex;gap:4px;margin-top:4px;}
.ag-label{flex:1;font-size:9px;color:var(--txt3);text-align:center;overflow:hidden;white-space:nowrap;}

/* ARTICLES TABLE */
.table-card{background:var(--sur);transition:background .3s;margin-bottom:20px;}
.table-toolbar{padding:14px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--bdr);flex-wrap:wrap;}
.table-toolbar h4{font-size:14px;font-weight:700;margin-right:auto;}
.srch{padding:7px 12px;border:1px solid var(--bdr);font-size:13px;background:var(--sur2);color:var(--txt);outline:none;width:200px;transition:border-color .2s,background .3s;}
.srch:focus{border-color:var(--red);}
.filter-sel{padding:7px 10px;border:1px solid var(--bdr);font-size:13px;background:var(--sur2);color:var(--txt);outline:none;transition:background .3s;}
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead{background:var(--sur2);}
th{padding:10px 12px;text-align:left;font-weight:700;font-size:12px;color:var(--txt2);white-space:nowrap;border-bottom:1px solid var(--bdr);}
td{padding:10px 12px;border-bottom:1px solid var(--bdr);vertical-align:middle;}
tr:hover td{background:var(--sur2);}
tr:last-child td{border-bottom:none;}
.art-thumb{width:44px;height:34px;object-fit:cover;flex-shrink:0;}
.art-nothumb{width:44px;height:34px;background:var(--sur3);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.title-cell{max-width:220px;}
.title-cell .tc-title{font-weight:700;font-size:13px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:2px;}
.title-cell .tc-en{font-size:11px;color:var(--txt3);display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;}
.badge{display:inline-block;padding:2px 8px;font-size:10.5px;font-weight:700;border-radius:2px;white-space:nowrap;}
.badge.pub{background:#dcfce7;color:#166534;}
.badge.draft{background:#fef9c3;color:#854d0e;}
[data-theme=dark] .badge.pub{background:#14532d;color:#86efac;}
[data-theme=dark] .badge.draft{background:#422006;color:#fcd34d;}
.cat-badge{background:var(--sur3);color:var(--txt2);font-size:11px;padding:2px 7px;font-weight:600;white-space:nowrap;}
.action-btns{display:flex;gap:5px;flex-wrap:nowrap;}
.ab{border:none;padding:5px 10px;font-size:11.5px;font-weight:700;cursor:pointer;transition:opacity .2s;white-space:nowrap;}
.ab:hover{opacity:.8;}
.ab.edit{background:#dbeafe;color:#1d4ed8;}
.ab.tog-pub{background:#dcfce7;color:#166534;}
.ab.tog-draft{background:#fef9c3;color:#854d0e;}
.ab.del{background:#fee2e2;color:#991b1b;}
[data-theme=dark] .ab.edit{background:#1e3a5f;color:#93c5fd;}
[data-theme=dark] .ab.tog-pub{background:#14532d;color:#86efac;}
[data-theme=dark] .ab.tog-draft{background:#422006;color:#fcd34d;}
[data-theme=dark] .ab.del{background:#4c0519;color:#fca5a5;}
.pagination{padding:12px 16px;display:flex;gap:6px;align-items:center;border-top:1px solid var(--bdr);}
.pg-btn{background:var(--sur2);border:1px solid var(--bdr);padding:5px 11px;font-size:13px;cursor:pointer;color:var(--txt2);transition:all .2s;}
.pg-btn.on,.pg-btn:hover{background:var(--red);color:#fff;border-color:var(--red);}
.pg-info{font-size:12px;color:var(--txt3);margin-left:auto;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;display:none;align-items:center;justify-content:center;padding:16px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--sur);width:100%;max-width:720px;max-height:90vh;display:flex;flex-direction:column;transition:background .3s;}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.modal-head h3{font-size:17px;font-weight:700;}
.modal-close{background:none;border:none;font-size:22px;color:var(--txt2);cursor:pointer;padding:0 4px;}
.modal-body{overflow-y:auto;padding:20px;flex:1;}
.modal-foot{padding:14px 20px;border-top:1px solid var(--bdr);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0;}
.fr{margin-bottom:14px;}
.fr label{display:block;font-size:12.5px;font-weight:700;margin-bottom:5px;color:var(--txt2);}
.fr input,.fr select,.fr textarea{width:100%;padding:9px 12px;border:1px solid var(--bdr);font-size:13.5px;font-family:'Noto Serif Bengali',serif;background:var(--sur2);color:var(--txt);outline:none;transition:border-color .2s,background .3s;}
.fr input:focus,.fr select:focus,.fr textarea:focus{border-color:var(--red);}
.fr textarea{resize:vertical;min-height:120px;line-height:1.9;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.lang-tabs{display:flex;border-bottom:2px solid var(--bdr);margin-bottom:14px;}
.ltab{padding:8px 18px;font-size:13px;font-weight:700;cursor:pointer;border:none;background:none;color:var(--txt3);border-bottom:2px solid transparent;margin-bottom:-2px;}
.ltab.on{color:var(--red);border-bottom-color:var(--red);}
.lang-panel{display:none;}
.lang-panel.on{display:block;}
.mbtn{padding:9px 22px;border:none;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;}
.mbtn.save{background:var(--red);color:#fff;}
.mbtn.save:hover{background:var(--dkred);}
.mbtn.cancel{background:var(--sur3);color:var(--txt2);}
.mbtn.cancel:hover{background:var(--bdr);}
.mbtn:disabled{opacity:.5;cursor:not-allowed;}

/* CONFIRM DIALOG */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:600;display:none;align-items:center;justify-content:center;padding:16px;}
.confirm-overlay.open{display:flex;}
.confirm-box{background:var(--sur);padding:28px;max-width:380px;width:100%;text-align:center;}
.confirm-box .ci{font-size:40px;margin-bottom:12px;}
.confirm-box h3{font-size:18px;font-weight:700;margin-bottom:8px;}
.confirm-box p{font-size:13px;color:var(--txt2);margin-bottom:22px;line-height:1.6;}
.confirm-btns{display:flex;gap:8px;justify-content:center;}
.cbtn{padding:10px 24px;border:none;font-size:14px;font-weight:700;cursor:pointer;}
.cbtn.yes{background:var(--danger);color:#fff;}
.cbtn.no{background:var(--sur3);color:var(--txt2);}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;z-index:700;padding:12px 20px;font-size:13.5px;font-weight:600;max-width:320px;display:none;animation:slideIn .3s ease;}
.toast.ok{background:#22c55e;color:#fff;}
.toast.err{background:var(--danger);color:#fff;}
.toast.info{background:var(--blue);color:#fff;}
@keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

/* EMPTY */
.empty-state{text-align:center;padding:60px 20px;color:var(--txt3);}
.empty-state .ei{font-size:44px;margin-bottom:12px;}

/* LOADING */
.loading-row td{text-align:center;padding:40px;color:var(--txt3);}
.spin{width:28px;height:28px;border:3px solid var(--bdr);border-top-color:var(--red);border-radius:50%;animation:sp .7s linear infinite;display:inline-block;}
@keyframes sp{to{transform:rotate(360deg)}}

/* RESPONSIVE */
@media(max-width:900px){
  .stats-grid{grid-template-columns:repeat(2,1fr);}
  .chart-row{grid-template-columns:1fr;}
}
@media(max-width:700px){
  .sidebar{transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);}
  .main{margin-left:0;}
  .mob-toggle{display:flex;}
  .overlay.open{display:block;}
  .stats-grid{grid-template-columns:repeat(2,1fr);}
  .two-col{grid-template-columns:1fr;}
}
@media(max-width:480px){
  .stats-grid{grid-template-columns:1fr;}
  .main{padding:14px;}
}
</style>
</head>
<body>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- LOCK -->
<div id="lock">
  <div class="lock-box">
    <div class="lock-logo">দৈনিক অনু<em>লি</em>পি</div>
    <div class="lock-sub">DAINIK ANULIPI</div>
    <div style="font-size:36px;margin-bottom:12px">🛡️</div>
    <div class="lock-title">অ্যাডমিন প্যানেল</div>
    <div class="lock-desc">শুধুমাত্র অনুমোদিত অ্যাডমিনদের জন্য।</div>
    <input class="lf" type="text"     id="l-url" placeholder="Apps Script Web App URL">
    <input class="lf" type="password" id="l-key" placeholder="Admin Secret Key" onkeydown="if(event.key==='Enter')adminLogin()">
    <button class="lbtn" onclick="adminLogin()">প্রবেশ করুন</button>
    <div class="lerr" id="lerr"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <button class="mob-toggle" onclick="toggleSidebar()">☰</button>
  <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sb-logo">
      <div class="sbl">দৈনিক অনু<em>লি</em>পি</div>
      <div class="sbsub">ADMIN PANEL</div>
    </div>
    <nav class="sb-nav">
      <div class="sn on" id="sn-dashboard" onclick="showPage('dashboard')"><span class="ic">📊</span> ড্যাশবোর্ড</div>
      <div class="sn"    id="sn-articles"  onclick="showPage('articles')"> <span class="ic">📰</span> সব সংবাদ</div>
      <div class="sn"    id="sn-published" onclick="showPage('published')"><span class="ic">✅</span> প্রকাশিত</div>
      <div class="sn"    id="sn-drafts"    onclick="showPage('drafts')">   <span class="ic">📝</span> ড্রাফট</div>
      <div class="sn"    onclick="window.open('index.html','_blank')">     <span class="ic">🌐</span> সাইট দেখুন</div>
      <div class="sn"    onclick="window.open('submit.html','_blank')">    <span class="ic">📤</span> রিপোর্টার পোর্টাল</div>
    </nav>
    <div class="sb-bottom">
      <button class="theme-btn" id="theme-btn" onclick="toggleTheme()">🌙</button>
      <button class="lo-btn" onclick="adminLogout()">লগআউট</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main" id="main-content">
    <!-- content rendered here -->
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-head">
      <h3>✏️ সংবাদ সম্পাদনা</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-slug">
      <div class="two-col">
        <div class="fr">
          <label>বিভাগ</label>
          <select id="edit-cat">
            <option>জাতীয়</option><option>সারাদেশ</option>
            <option>বিশেষ সংবাদ</option><option>বিশ্ব সংবাদ</option>
            <option>বাণিজ্য</option><option>অর্থনীতি</option>
            <option>খেলা</option><option>আনন্দ সময়</option>
            <option>চাকরি</option><option>মতামত</option>
          </select>
        </div>
        <div class="fr">
          <label>তারিখ</label>
          <input type="text" id="edit-date">
        </div>
      </div>
      <div class="fr">
        <label>রিপোর্টার</label>
        <input type="text" id="edit-author">
      </div>
      <div class="fr">
        <label>ছবির URL</label>
        <input type="text" id="edit-img">
      </div>
      <div class="lang-tabs">
        <button class="ltab on" id="etab-bn" onclick="switchEditTab('bn')">🇧🇩 বাংলা</button>
        <button class="ltab"    id="etab-en" onclick="switchEditTab('en')">🇬🇧 English</button>
      </div>
      <div class="lang-panel on" id="epanel-bn">
        <div class="fr"><label>শিরোনাম (বাংলা)</label><input type="text" id="edit-title-bn"></div>
        <div class="fr"><label>সারাংশ (বাংলা)</label><input type="text" id="edit-summary-bn"></div>
        <div class="fr"><label>বিস্তারিত (বাংলা)</label><textarea id="edit-content-bn" style="min-height:180px"></textarea></div>
      </div>
      <div class="lang-panel" id="epanel-en">
        <div class="fr"><label>Headline (English)</label><input type="text" id="edit-title-en" style="font-family:sans-serif"></div>
        <div class="fr"><label>Summary (English)</label><input type="text" id="edit-summary-en" style="font-family:sans-serif"></div>
        <div class="fr"><label>Content (English)</label><textarea id="edit-content-en" style="min-height:180px;font-family:sans-serif"></textarea></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="mbtn cancel" onclick="closeModal()">বাতিল</button>
      <button class="mbtn save" id="save-btn" onclick="saveEdit()">💾 সংরক্ষণ করুন</button>
    </div>
  </div>
</div>

<!-- CONFIRM DIALOG -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <div class="ci" id="confirm-icon">🗑️</div>
    <h3 id="confirm-title">নিশ্চিত করুন</h3>
    <p id="confirm-msg">আপনি কি নিশ্চিত?</p>
    <div class="confirm-btns">
      <button class="cbtn no" onclick="closeConfirm()">না</button>
      <button class="cbtn yes" id="confirm-yes">হ্যাঁ, করুন</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════
//  STATE
// ══════════════════════════════════
let API_URL   = '';
let ADMIN_KEY = '';
let allArticles = [];
let curPage = 1;
const PER_PAGE = 15;
let curFilter = '';
let curSearch = '';
let curPageId = 'dashboard';
let theme = localStorage.getItem('anulipi_admin_theme') || 'dark';

const CAT_COLORS = {
  'জাতীয়':'#d32f2f','সারাদেশ':'#f57c00','বিশেষ সংবাদ':'#7b1fa2',
  'বিশ্ব সংবাদ':'#1565c0','বাণিজ্য':'#2e7d32','অর্থনীতি':'#00695c',
  'খেলা':'#e65100','আনন্দ সময়':'#c2185b','চাকরি':'#5c6bc0','মতামত':'#6d4c41'
};

// ── THEME ──
function applyTheme(t) {
  theme = t;
  document.documentElement.setAttribute('data-theme', t);
  const btn = document.getElementById('theme-btn');
  if (btn) btn.textContent = t === 'dark' ? '☀️' : '🌙';
  localStorage.setItem('anulipi_admin_theme', t);
}
function toggleTheme() { applyTheme(theme === 'dark' ? 'light' : 'dark'); }

// ── LOGIN ──
function adminLogin() {
  const url = document.getElementById('l-url').value.trim();
  const key = document.getElementById('l-key').value.trim();
  if (!url || !key) { showErr('URL ও Key উভয়ই দিন।'); return; }
  if (!url.startsWith('http')) { showErr('সঠিক URL দিন।'); return; }
  API_URL   = url;
  ADMIN_KEY = key;
  // Save URL in localStorage (persists across sessions), key in sessionStorage only
  localStorage.setItem('anulipi_admin_url', url);
  sessionStorage.setItem('anulipi_admin', JSON.stringify({ url, key }));
  launchApp();
}
function showErr(msg) {
  const el = document.getElementById('lerr');
  el.textContent = '❌ ' + msg;
  el.style.display = 'block';
}
function adminLogout() {
  sessionStorage.removeItem('anulipi_admin');
  location.reload();
}
function launchApp() {
  document.getElementById('lock').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  applyTheme(theme);
  showPage('dashboard');
  loadArticles();
}

// Auto-restore session
(function() {
  applyTheme(theme);
  // Pre-fill saved URL so user doesn't have to retype it
  const savedUrl = localStorage.getItem('anulipi_admin_url');
  if (savedUrl) {
    const urlInput = document.getElementById('l-url');
    if (urlInput) urlInput.value = savedUrl;
  }
  const s = sessionStorage.getItem('anulipi_admin');
  if (s) {
    const d = JSON.parse(s);
    API_URL = d.url; ADMIN_KEY = d.key;
    launchApp();
  }
})();

// ── SIDEBAR ──
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}
function showPage(id) {
  curPageId = id;
  document.querySelectorAll('.sn').forEach(n => n.classList.remove('on'));
  const el = document.getElementById('sn-' + id);
  if (el) el.classList.add('on');
  if (id === 'dashboard') renderDashboard();
  else if (id === 'articles') renderArticlesPage('');
  else if (id === 'published') renderArticlesPage('published');
  else if (id === 'drafts')    renderArticlesPage('draft');
}

// ── DATA ──
async function loadArticles() {
  try {
    const res = await fetch(`${API_URL}?action=getAll&key=${encodeURIComponent(ADMIN_KEY)}`);
    const d   = await res.json();
    if (d.success) { allArticles = d.articles; refreshCurrentPage(); }
    else toast('err', '❌ ডেটা লোড ব্যর্থ: ' + (d.error || ''));
  } catch(e) { toast('err', '❌ সংযোগ ব্যর্থ: ' + e.message); }
}

function refreshCurrentPage() {
  if (curPageId === 'dashboard') renderDashboard();
  else if (curPageId === 'articles')  renderArticlesPage('');
  else if (curPageId === 'published') renderArticlesPage('published');
  else if (curPageId === 'drafts')    renderArticlesPage('draft');
}

// ── API CALLS ──
async function apiPost(payload) {
  const res = await fetch(API_URL, {
    method: 'POST',
    body: JSON.stringify({ ...payload, adminKey: ADMIN_KEY })
  });
  return await res.json();
}

// ── TOAST ──
function toast(type, msg, dur = 3500) {
  const el = document.getElementById('toast');
  el.className = 'toast ' + type;
  el.textContent = msg;
  el.style.display = 'block';
  clearTimeout(el._t);
  el._t = setTimeout(() => el.style.display = 'none', dur);
}

// ── DASHBOARD ──
function renderDashboard() {
  const pub    = allArticles.filter(a => a.status === 'published').length;
  const draft  = allArticles.filter(a => a.status !== 'published').length;
  const authors = new Set(allArticles.map(a => a.author)).size;
  const cats    = {};
  allArticles.forEach(a => { cats[a.category] = (cats[a.category] || 0) + 1; });
  const maxCat  = Math.max(...Object.values(cats), 1);

  // Activity last 7 days
  const now = new Date();
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(now); d.setDate(now.getDate() - i);
    const ds = d.toDateString();
    const count = allArticles.filter(a => a.timestamp && new Date(a.timestamp).toDateString() === ds).length;
    days.push({ label: d.getDate() + '/' + (d.getMonth() + 1), count });
  }
  const maxDay = Math.max(...days.map(d => d.count), 1);

  // Top authors
  const authorMap = {};
  allArticles.forEach(a => { authorMap[a.author] = (authorMap[a.author] || 0) + 1; });
  const topAuthors = Object.entries(authorMap).sort((a,b)=>b[1]-a[1]).slice(0,5);

  document.getElementById('main-content').innerHTML = `
    <div class="page-head">
      <h2>📊 ড্যাশবোর্ড</h2>
      <p>দৈনিক অনুলিপির সামগ্রিক পরিসংখ্যান</p>
    </div>

    <div class="stats-grid">
      <div class="stat-card total">
        <span class="si">📰</span>
        <div class="sv">${allArticles.length}</div>
        <div class="sl">মোট সংবাদ</div>
      </div>
      <div class="stat-card pub">
        <span class="si">✅</span>
        <div class="sv">${pub}</div>
        <div class="sl">প্রকাশিত</div>
      </div>
      <div class="stat-card draft">
        <span class="si">📝</span>
        <div class="sv">${draft}</div>
        <div class="sl">ড্রাফট</div>
      </div>
      <div class="stat-card authors">
        <span class="si">✍️</span>
        <div class="sv">${authors}</div>
        <div class="sl">রিপোর্টার</div>
      </div>
    </div>

    <div class="chart-row">
      <div class="chart-card">
        <h4>📁 বিভাগ অনুযায়ী সংবাদ</h4>
        <div class="bar-chart">
          ${Object.entries(cats).sort((a,b)=>b[1]-a[1]).map(([cat,cnt]) => `
            <div class="bc-row">
              <span class="bc-label">${cat}</span>
              <div class="bc-track">
                <div class="bc-fill" style="width:${(cnt/maxCat*100).toFixed(0)}%;background:${CAT_COLORS[cat]||'var(--red)'}">
                  <span>${cnt}</span>
                </div>
              </div>
            </div>`).join('') || '<p style="color:var(--txt3);font-size:13px">কোনো ডেটা নেই</p>'}
        </div>
      </div>

      <div class="chart-card">
        <h4>📅 গত ৭ দিনের কার্যক্রম</h4>
        <div class="activity-grid">
          ${days.map(d => `<div class="ag-bar" style="height:${(d.count/maxDay*100).toFixed(0)}%" title="${d.label}: ${d.count}টি সংবাদ"></div>`).join('')}
        </div>
        <div class="ag-labels">
          ${days.map(d => `<div class="ag-label">${d.label}</div>`).join('')}
        </div>
        <div style="margin-top:14px">
          <h4 style="font-size:13px;margin-bottom:10px">🏆 শীর্ষ রিপোর্টার</h4>
          ${topAuthors.map(([name,cnt],i) => `
            <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--bdr);font-size:13px;">
              <span>${['🥇','🥈','🥉','4.','5.'][i]} ${name}</span>
              <span style="font-weight:700;color:var(--red)">${cnt}টি</span>
            </div>`).join('') || '<p style="color:var(--txt3);font-size:13px">কোনো ডেটা নেই</p>'}
        </div>
      </div>
    </div>

    <div class="table-card">
      <div class="table-toolbar"><h4>🕐 সর্বশেষ ১০টি সংবাদ</h4></div>
      ${renderTable(allArticles.slice(0, 10), false)}
    </div>`;
}

// ── ARTICLES PAGE ──
function renderArticlesPage(statusFilter) {
  let filtered = allArticles;
  if (statusFilter) filtered = filtered.filter(a => a.status === statusFilter);
  if (curSearch)    filtered = filtered.filter(a =>
    a.titleBn.includes(curSearch) || a.titleEn.toLowerCase().includes(curSearch.toLowerCase()) ||
    a.author.includes(curSearch)  || a.category.includes(curSearch));
  if (curFilter)    filtered = filtered.filter(a => a.category === curFilter);

  const total  = filtered.length;
  const pages  = Math.ceil(total / PER_PAGE) || 1;
  if (curPage > pages) curPage = 1;
  const paged  = filtered.slice((curPage - 1) * PER_PAGE, curPage * PER_PAGE);

  const cats   = [...new Set(allArticles.map(a => a.category))];
  const label  = statusFilter === 'published' ? '✅ প্রকাশিত সংবাদ' : statusFilter === 'draft' ? '📝 ড্রাফট সংবাদ' : '📰 সব সংবাদ';

  document.getElementById('main-content').innerHTML = `
    <div class="page-head">
      <h2>${label}</h2>
      <p>মোট ${total}টি সংবাদ পাওয়া গেছে</p>
    </div>
    <div class="table-card">
      <div class="table-toolbar">
        <h4>${label}</h4>
        <input class="srch" type="text" placeholder="🔍 খুঁজুন…" value="${curSearch}" oninput="curSearch=this.value;curPage=1;renderArticlesPage('${statusFilter}')">
        <select class="filter-sel" onchange="curFilter=this.value;curPage=1;renderArticlesPage('${statusFilter}')">
          <option value="">সব বিভাগ</option>
          ${cats.map(c => `<option value="${c}" ${curFilter===c?'selected':''}>${c}</option>`).join('')}
        </select>
        <button class="ab edit" onclick="loadArticles().then(()=>renderArticlesPage('${statusFilter}'))">🔄 রিফ্রেশ</button>
      </div>
      ${renderTable(paged, true)}
      <div class="pagination">
        <button class="pg-btn" onclick="curPage=Math.max(1,curPage-1);renderArticlesPage('${statusFilter}')" ${curPage===1?'disabled':''}>‹</button>
        ${Array.from({length:pages},(_,i)=>i+1).map(p=>
          `<button class="pg-btn ${p===curPage?'on':''}" onclick="curPage=${p};renderArticlesPage('${statusFilter}')">${p}</button>`
        ).join('')}
        <button class="pg-btn" onclick="curPage=Math.min(pages,curPage+1);renderArticlesPage('${statusFilter}')" ${curPage===pages?'disabled':''}>›</button>
        <span class="pg-info">${(curPage-1)*PER_PAGE+1}–${Math.min(curPage*PER_PAGE,total)} / ${total}</span>
      </div>
    </div>`;
}

// ── TABLE HTML ──
function renderTable(arts, showAll) {
  if (!arts.length) return `<div class="empty-state"><div class="ei">📭</div><p>কোনো সংবাদ পাওয়া যায়নি</p></div>`;
  return `<div class="tbl-wrap"><table>
    <thead><tr>
      <th>ছবি</th><th>শিরোনাম</th><th>বিভাগ</th><th>রিপোর্টার</th>
      <th>তারিখ</th><th>অবস্থা</th>${showAll?'<th>কার্যক্রম</th>':''}
    </tr></thead>
    <tbody>
      ${arts.map(a => `<tr>
        <td>${a.imageUrl
          ? `<img class="art-thumb" src="${a.imageUrl}" onerror="this.outerHTML='<div class=art-nothumb>📰</div>'" alt="">`
          : `<div class="art-nothumb">📰</div>`}</td>
        <td class="title-cell">
          <div class="tc-title">${a.titleBn||'(শিরোনাম নেই)'}</div>
          <div class="tc-en">${a.titleEn||''}</div>
        </td>
        <td><span class="cat-badge" style="background:${CAT_COLORS[a.category]||'var(--red)'};color:#fff">${a.category||'—'}</span></td>
        <td style="font-size:12.5px">${a.author||'—'}</td>
        <td style="font-size:12px;white-space:nowrap">${a.date||'—'}</td>
        <td><span class="badge ${a.status==='published'?'pub':'draft'}">${a.status==='published'?'প্রকাশিত':'ড্রাফট'}</span></td>
        ${showAll?`<td><div class="action-btns">
          <button class="ab edit" onclick='openEdit(${JSON.stringify(a).replace(/'/g,"&#39;")})'>✏️</button>
          <button class="ab ${a.status==='published'?'tog-draft':'tog-pub'}" onclick="toggleStatus('${a.slug}','${a.status==='published'?'draft':'published'}',this)">
            ${a.status==='published'?'📝 ড্রাফট':'✅ প্রকাশ'}
          </button>
          <button class="ab del" onclick="confirmDelete('${a.slug}','${(a.titleBn||'').replace(/'/g,"&#39;")}')">🗑️</button>
        </div></td>`:''}
      </tr>`).join('')}
    </tbody>
  </table></div>`;
}

// ── TOGGLE STATUS ──
async function toggleStatus(slug, newStatus, btn) {
  btn.disabled = true;
  try {
    const r = await apiPost({ action: 'setStatus', slug, status: newStatus });
    if (r.success) {
      const art = allArticles.find(a => a.slug === slug);
      if (art) art.status = newStatus;
      toast('ok', newStatus === 'published' ? '✅ সংবাদ প্রকাশিত হয়েছে!' : '📝 ড্রাফটে নেওয়া হয়েছে');
      refreshCurrentPage();
    } else toast('err', '❌ ' + (r.error || 'ব্যর্থ'));
  } catch(e) { toast('err', '❌ ' + e.message); }
  finally { btn.disabled = false; }
}

// ── DELETE ──
let _deleteSlug = '';
function confirmDelete(slug, title) {
  _deleteSlug = slug;
  document.getElementById('confirm-title').textContent = 'সংবাদ মুছুন';
  document.getElementById('confirm-msg').textContent = `"${title}" মুছে ফেলবেন? এটি ফেরত আনা যাবে না।`;
  document.getElementById('confirm-yes').onclick = doDelete;
  document.getElementById('confirm-overlay').classList.add('open');
}
function closeConfirm() { document.getElementById('confirm-overlay').classList.remove('open'); }
async function doDelete() {
  closeConfirm();
  try {
    const r = await apiPost({ action: 'delete', slug: _deleteSlug });
    if (r.success) {
      allArticles = allArticles.filter(a => a.slug !== _deleteSlug);
      toast('ok', '🗑️ সংবাদ মুছে ফেলা হয়েছে।');
      refreshCurrentPage();
    } else toast('err', '❌ ' + (r.error || 'মুছতে ব্যর্থ'));
  } catch(e) { toast('err', '❌ ' + e.message); }
}

// ── EDIT MODAL ──
function switchEditTab(l) {
  ['bn','en'].forEach(t => {
    document.getElementById('etab-'+t).classList.toggle('on', t===l);
    document.getElementById('epanel-'+t).classList.toggle('on', t===l);
  });
}
function openEdit(art) {
  document.getElementById('edit-slug').value       = art.slug;
  document.getElementById('edit-cat').value        = art.category;
  document.getElementById('edit-date').value       = art.date;
  document.getElementById('edit-author').value     = art.author;
  document.getElementById('edit-img').value        = art.imageUrl;
  document.getElementById('edit-title-bn').value   = art.titleBn;
  document.getElementById('edit-summary-bn').value = art.summaryBn;
  document.getElementById('edit-content-bn').value = art.contentBn;
  document.getElementById('edit-title-en').value   = art.titleEn;
  document.getElementById('edit-summary-en').value = art.summaryEn;
  document.getElementById('edit-content-en').value = art.contentEn;
  switchEditTab('bn');
  document.getElementById('edit-modal').classList.add('open');
}
function closeModal() { document.getElementById('edit-modal').classList.remove('open'); }
async function saveEdit() {
  const btn  = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = '⏳ সংরক্ষণ হচ্ছে…';
  try {
    const r = await apiPost({
      action:    'update',
      slug:      document.getElementById('edit-slug').value,
      category:  document.getElementById('edit-cat').value,
      date:      document.getElementById('edit-date').value,
      author:    document.getElementById('edit-author').value,
      imageUrl:  document.getElementById('edit-img').value,
      titleBn:   document.getElementById('edit-title-bn').value,
      summaryBn: document.getElementById('edit-summary-bn').value,
      contentBn: document.getElementById('edit-content-bn').value,
      titleEn:   document.getElementById('edit-title-en').value,
      summaryEn: document.getElementById('edit-summary-en').value,
      contentEn: document.getElementById('edit-content-en').value,
    });
    if (r.success) {
      closeModal();
      toast('ok', '✅ সংবাদ আপডেট হয়েছে!');
      await loadArticles();
    } else toast('err', '❌ ' + (r.error || 'আপডেট ব্যর্থ'));
  } catch(e) { toast('err', '❌ ' + e.message); }
  finally { btn.disabled = false; btn.textContent = '💾 সংরক্ষণ করুন'; }
}

// Close modal on outside click
document.getElementById('edit-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
